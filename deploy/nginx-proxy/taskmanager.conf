# Vhost pentru nginx-proxy-ul EXTERN (container `nginx-proxy`, image nginx:alpine).
#
# DEPLOY (pe server, nginx NU e pe host — e în containerul nginx-proxy):
#   1. Asigură rețeaua comună:   docker network create proxy 2>/dev/null || true
#   2. Proxy pe rețea:           docker network connect proxy nginx-proxy 2>/dev/null || true
#   3. App-urile pe rețea le atașează `docker compose up -d` (au networks: [default, proxy]).
#   4. Copiază ACEST fișier în directorul montat în container:
#        cp deploy/nginx-proxy/taskmanager.conf /opt/nginx-proxy/conf.d/taskmanager.conf
#      (host /opt/nginx-proxy/conf.d  ->  container /etc/nginx/conf.d)
#   5. Test + reload DIN CONTAINER:
#        docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload
#   6. Verifică:  curl -I https://taskmanager.sma1lsoft.eu/
#
# NU edita prin `cat << EOF` / `nano` cu paste pe server — lipirea multi-linie se duce în bash
# și strică fișierul. Copiază fișierul ăsta versionat (`cp`), zero lipire = zero erori.

server {
    listen 80;
    server_name taskmanager.sma1lsoft.eu;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name taskmanager.sma1lsoft.eu;

    ssl_certificate     /etc/letsencrypt/live/taskmanager.sma1lsoft.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taskmanager.sma1lsoft.eu/privkey.pem;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://taskmanager-backend-1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Service worker servit mereu proaspăt
    location = /sw.js {
        proxy_pass http://taskmanager-frontend-1:3000/sw.js;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        expires off;
    }

    location / {
        proxy_pass http://taskmanager-frontend-1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
