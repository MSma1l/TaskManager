[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=app.services.membership_service
    --cov=app.services.project_service
    --cov=app.services.sprint_service
    --cov=app.services.board_service
    --cov=app.services.quick_task_service
    --cov=app.services.stats_service
    --cov=app.services.report_share_service
    --cov=app.services.collaboration_service
    --cov=app.services.completion_service
    --cov=app.services.bug_report_service
    --cov=app.api.members
    --cov=app.api.quick_tasks
    --cov=app.api.report_shares
    --cov=app.api.bug_reports
    --cov-report=term-missing
    --cov-fail-under=85
