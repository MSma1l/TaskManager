# ── HTTP (80): ACME challenge + redirect spre HTTPS ──────────────────
server {
    listen 80;
    server_name taskmanager.sma1lsoft.eu;

    # Let's Encrypt / Certbot validare (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # tot restul → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (443): aplicația ────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name taskmanager.sma1lsoft.eu;

    ssl_certificate     /etc/letsencrypt/live/taskmanager.sma1lsoft.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taskmanager.sma1lsoft.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # upload-uri (schițe notebook etc.)
    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Service worker MUST be served fresh — never cache
    location = /sw.js {
        proxy_pass http://frontend:3000/sw.js;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        add_header Cache-Control "no-cache" always;
    }
}
