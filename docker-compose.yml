services:
  postgres:
    image: postgres:15-alpine
    container_name: taskmanager-postgres-1
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskmanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: taskmanager-backend-1
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh /app/start.sh
    networks:
      - default
      - proxy

  frontend:
    build: ./frontend
    container_name: taskmanager-frontend-1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - default
      - proxy

volumes:
  postgres_data:

# Rețea comună cu nginx-proxy-ul extern, ca proxy-ul să poată rezolva
# `taskmanager-backend-1` / `taskmanager-frontend-1` după nume.
# Pe server: `docker network create proxy` (o dată) + conectezi containerul proxy la ea.
networks:
  proxy:
    external: true
